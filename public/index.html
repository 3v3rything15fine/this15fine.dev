<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>this15fine.dev</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', 'Liberation Mono', 'Courier New', monospace;
      background: #2E3440;
      color: #D8DEE9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }

    .container {
      max-width: 560px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #ECEFF4;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .tagline {
      font-size: 14px;
      color: #4C566A;
      margin-bottom: 48px;
    }

    p {
      font-size: 14px;
      color: #D8DEE9;
      margin-bottom: 24px;
    }

    a {
      color: #88C0D0;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    a:visited {
      color: #5E81AC;
    }

    .links {
      margin-top: 32px;
      font-size: 13px;
      color: #4C566A;
    }

    .links a {
      color: #88C0D0;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #6B3040;
      margin: 32px auto;
      border-radius: 1px;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>this15fine.dev</h1>
    <div class="tagline">// coming soon</div>

    <div class="divider"></div>

    <p>Something is being built here.</p>

    <div class="links">
      <a href="https://github.com/3v3rything15fine">github</a>
      &nbsp;&middot;&nbsp;
      <a href="/workshop/">signature workshop</a>
    </div>
  </div>
</body>
</html>
