<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- Caution stripes background -->
  <defs>
    <pattern id="stripes" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="20" fill="#EBCB8B"/>
      <rect x="10" width="10" height="20" fill="#2E3440"/>
    </pattern>
  </defs>
  <rect x="5" y="5" width="190" height="90" rx="6" fill="#2E3440" stroke="#4C566A" stroke-width="1.5"/>
  <rect x="8" y="8" width="184" height="20" rx="3" fill="url(#stripes)" opacity="0.7"/>
  <rect x="8" y="72" width="184" height="20" rx="3" fill="url(#stripes)" opacity="0.7"/>
  <!-- Terminal cursor icon -->
  <rect x="30" y="36" width="28" height="22" rx="3" fill="#3B4252" stroke="#88C0D0" stroke-width="1"/>
  <text x="34" y="53" font-family="monospace" font-size="12" fill="#88C0D0">_</text>
  <!-- Text -->
  <text x="68" y="47" font-family="monospace" font-size="10" fill="#88C0D0" font-weight="bold">UNDER</text>
  <text x="68" y="60" font-family="monospace" font-size="10" fill="#88C0D0" font-weight="bold">CONSTRUCTION</text>
</svg>